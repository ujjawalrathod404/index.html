<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Optical Interference Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #0d0d0d; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 340px; background-color: #111; padding: 20px; border-right: 2px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
        .main-content { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        h2, h3 { color: cyan; margin-top: 0; margin-bottom: 5px; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #ccc; }
        input[type="range"] { width: 100%; cursor: pointer; }
        select { width: 100%; padding: 6px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        button { padding: 8px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .btn-save { background: #00aaff; color: white; flex: 1; }
        .btn-clear { background: #aa0000; color: white; flex: 1; }
        .flex-row { display: flex; gap: 10px; margin-top: 5px; }
        .info-panel { background: #1a1f29; padding: 15px; border: 1px solid #00ff00; color: #00ff00; font-family: Consolas, monospace; font-size: 13px; border-radius: 4px; margin-top: auto; }
        canvas { background: #000; border-radius: 4px; }
        #topDownCanvas { width: 100%; height: 200px; border: 1px solid #333; image-rendering: pixelated; }
        #patternCanvas { width: 100%; height: 120px; border: 1px solid #333; }
        .chart-container { flex-grow: 1; position: relative; border: 1px solid #333; border-radius: 4px; background: #0d0d0d; padding: 10px; min-height: 250px; }
        .disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Control Panel</h2>

        <div class="control-group">
            <label>Aperture Geometry</label>
            <select id="shape">
                <option value="rect">Rectangular Slit(s)</option>
                <option value="circ">Circular Pinhole (Airy Disk)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Wavelength (nm) <span id="val_lam">550</span></label>
            <input type="range" id="lam" min="400" max="700" value="550" step="1">
        </div>
        <div class="control-group" id="group_N">
            <label>Number of Slits (N) <span id="val_N">2</span></label>
            <input type="range" id="N" min="1" max="10" value="2" step="1">
        </div>
        <div class="control-group" id="group_d">
            <label>Slit Distance (mm) <span id="val_d">2.00</span></label>
            <input type="range" id="d" min="0.1" max="5.0" value="2.0" step="0.01">
        </div>
        <div class="control-group">
            <label id="label_a">Slit Width (mm) <span id="val_a">0.30</span></label>
            <input type="range" id="a" min="0.05" max="1.0" value="0.3" step="0.01">
        </div>
        <div class="control-group">
            <label>Screen Distance (m) <span id="val_L">1.00</span></label>
            <input type="range" id="L" min="0.5" max="2.0" value="1.0" step="0.01">
        </div>

        <div class="control-group">
            <label>Data Memory Bank</label>
            <div class="flex-row">
                <button class="btn-save" onclick="saveSnapshot()">Save Snapshot</button>
                <button class="btn-clear" onclick="clearSnapshot()">Clear</button>
            </div>
        </div>

        <div class="info-panel" id="theoryPanel">
            <strong>Real-Time Math</strong><br><br>
            Max Spacing: <span id="out_spacing">--</span> mm<br>
            Path Diff (Δx): Hover over chart<br>
            Phase (α): Hover over chart<br>
            Phase (β): Hover over chart
        </div>
    </div>

    <div class="main-content">
        <div>
            <h3>1. Top-Down Wave Propagation</h3>
            <canvas id="topDownCanvas"></canvas>
        </div>
        <div>
            <h3>2. Screen Intensity Pattern</h3>
            <canvas id="patternCanvas"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="intensityChart"></canvas>
        </div>
    </div>

    <script>
        const sliders = {
            lam: document.getElementById('lam'),
            N: document.getElementById('N'),
            d: document.getElementById('d'),
            a: document.getElementById('a'),
            L: document.getElementById('L')
        };
        const shapeSelect = document.getElementById('shape');
        const patternCanvas = document.getElementById('patternCanvas');
        const ctxPattern = patternCanvas.getContext('2d');
        const topDownCanvas = document.getElementById('topDownCanvas');
        const tdCtx = topDownCanvas.getContext('2d');
        let chartInstance = null;

        // Memory Bank Variables
        let snapIntensity = null;
        let snapEnvelope = null;
        let snapColor = 'rgba(255, 255, 255, 0.4)';

        const POINTS = 800;
        const x_vals = Array.from({length: POINTS}, (_, i) => -0.01 + (i / (POINTS - 1)) * 0.02);

        // Bessel Function J1(x) Approximation
        function j1(x) {
            let ax = Math.abs(x);
            let y, ans1, ans2;
            if (ax < 8.0) {
                y = x * x;
                ans1 = x * (72362614232.0 + y * (-7895059235.0 + y * (242396853.1 + y * (-2972611.439 + y * (15704.48260 + y * (-30.16036606))))));
                ans2 = 144725228442.0 + y * (2300535178.0 + y * (18583304.74 + y * (99447.43394 + y * (376.9991397 + y * 1.0))));
                return ans1 / ans2;
            } else {
                let z = 8.0 / ax;
                y = z * z;
                let xx = ax - 2.356194491;
                ans1 = 1.0 + y * (0.183105e-2 + y * (-0.3516396496e-4 + y * (0.2457520174e-5 + y * (-0.240337019e-6))));
                ans2 = 0.04687499995 + y * (-0.2002690873e-3 + y * (0.8449199096e-5 + y * (-0.88228987e-6 + y * 0.105787412e-6)));
                let ans = Math.sqrt(0.636619772 / ax) * (Math.cos(xx) * ans1 - z * Math.sin(xx) * ans2);
                return x < 0.0 ? -ans : ans;
            }
        }

        function waveToRGB(nm) {
            let r=0, g=0, b=0;
            if(nm >= 400 && nm < 440) { r = -(nm - 440) / (440 - 400); b = 1.0; }
            else if(nm >= 440 && nm < 490) { g = (nm - 440) / (490 - 440); b = 1.0; }
            else if(nm >= 490 && nm < 510) { g = 1.0; b = -(nm - 510) / (510 - 490); }
            else if(nm >= 510 && nm < 580) { r = (nm - 510) / (580 - 510); g = 1.0; }
            else if(nm >= 580 && nm < 645) { r = 1.0; g = -(nm - 645) / (645 - 580); }
            else if(nm >= 645 && nm <= 700) { r = 1.0; }
            return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
        }

        function toggleUI() {
            const isCirc = shapeSelect.value === 'circ';
            document.getElementById('group_N').className = isCirc ? 'control-group disabled' : 'control-group';
            document.getElementById('group_d').className = isCirc ? 'control-group disabled' : 'control-group';
            document.getElementById('label_a').innerHTML = isCirc ? `Diameter (mm) <span id="val_a">${parseFloat(sliders.a.value).toFixed(2)}</span>` : `Slit Width (mm) <span id="val_a">${parseFloat(sliders.a.value).toFixed(2)}</span>`;
            updateAll();
        }

        function computePhysics() {
            const shape = shapeSelect.value;
            const lam = parseFloat(sliders.lam.value) * 1e-9;
            const N = shape === 'circ' ? 1 : parseInt(sliders.N.value);
            const d = parseFloat(sliders.d.value) * 1e-3;
            const a = parseFloat(sliders.a.value) * 1e-3;
            const L = parseFloat(sliders.L.value);

            let intensity = new Array(POINTS);
            let envelope = new Array(POINTS);

            for (let i = 0; i < POINTS; i++) {
                let x = x_vals[i];
                let beta = (Math.PI * a * x) / (lam * L);

                if (shape === 'rect') {
                    let alpha = (Math.PI * d * x) / (lam * L);
                    let diff = (beta === 0) ? 1.0 : Math.pow(Math.sin(beta) / beta, 2);
                    envelope[i] = diff;
                    let inter = 1.0;
                    if (N > 1) {
                        if (Math.abs(Math.sin(alpha)) > 1e-8) inter = Math.pow(Math.sin(N * alpha) / Math.sin(alpha), 2) / (N * N);
                    }
                    intensity[i] = diff * inter;
                } else {
                    let diff = (beta === 0) ? 1.0 : Math.pow((2 * j1(beta)) / beta, 2);
                    envelope[i] = diff;
                    intensity[i] = diff; 
                }
            }
            let spacing = (shape === 'rect' && d !== 0 && N > 1) ? ((lam * L) / d) * 1000 : 0;
            document.getElementById('out_spacing').innerText = shape === 'rect' ? spacing.toFixed(3) : "N/A (Circular)";
            return { intensity, envelope };
        }

        // Memory Bank Functions
        function saveSnapshot() {
            const data = computePhysics();
            // Create a deep copy of the arrays into memory
            snapIntensity = [...data.intensity];
            snapEnvelope = [...data.envelope];
            const rgb = waveToRGB(parseFloat(sliders.lam.value));
            snapColor = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.8)`;
            updateAll();
        }

        function clearSnapshot() {
            snapIntensity = null;
            snapEnvelope = null;
            updateAll();
        }

        function renderPattern(intensity) {
            patternCanvas.width = patternCanvas.clientWidth;
            patternCanvas.height = patternCanvas.clientHeight;
            const rgb = waveToRGB(sliders.lam.value);
            ctxPattern.clearRect(0, 0, patternCanvas.width, patternCanvas.height);
            
            if (shapeSelect.value === 'rect') {
                const w = patternCanvas.width / POINTS;
                for (let i = 0; i < POINTS; i++) {
                    let alpha = Math.pow(intensity[i], 0.5); 
                    ctxPattern.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
                    ctxPattern.fillRect(i * w, 0, Math.ceil(w), patternCanvas.height);
                }
            } else {
                const cx = patternCanvas.width / 2;
                const cy = patternCanvas.height / 2;
                const maxRadius = patternCanvas.width / 2;
                for(let r = maxRadius; r > 0; r--) {
                    let ratio = r / maxRadius;
                    let arrayIndex = Math.floor((POINTS / 2) + ratio * (POINTS / 2));
                    if (arrayIndex >= POINTS) arrayIndex = POINTS - 1;
                    let val = intensity[arrayIndex];
                    let alpha = Math.pow(val, 0.4); 
                    ctxPattern.beginPath();
                    ctxPattern.arc(cx, cy, r, 0, 2 * Math.PI);
                    ctxPattern.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
                    ctxPattern.fill();
                }
            }
        }

        function renderChart(data) {
            const currentDatasets = [
                { label: 'Live Total Intensity', data: data.intensity, borderColor: 'cyan', borderWidth: 2, pointRadius: 0, tension: 0.1 },
                { label: 'Live Envelope', data: data.envelope, borderColor: 'red', borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, tension: 0.1 }
            ];

            // Dynamically inject the memory arrays if they exist
            if (snapIntensity) {
                currentDatasets.push({ label: 'Snapshot Intensity', data: snapIntensity, borderColor: snapColor, borderWidth: 2, borderDash: [2, 2], pointRadius: 0, tension: 0.1 });
                currentDatasets.push({ label: 'Snapshot Envelope', data: snapEnvelope, borderColor: 'rgba(150, 150, 150, 0.5)', borderWidth: 1, borderDash: [5, 5], pointRadius: 0, tension: 0.1 });
            }

            if (chartInstance) {
                chartInstance.data.datasets = currentDatasets;
                chartInstance.update('none'); 
                return;
            }

            const ctx = document.getElementById('intensityChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: x_vals.map(x => (x * 1000).toFixed(1)), datasets: currentDatasets },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { labels: { color: 'white' } } },
                    scales: {
                        x: { title: { display: true, text: 'Position on Screen (mm)', color: 'white' }, ticks: { color: '#ccc', maxTicksLimit: 20 } },
                        y: { title: { display: true, text: 'Relative Intensity', color: 'white' }, min: 0, max: 1.05, ticks: { color: '#ccc' } }
                    }
                }
            });
        }

        const tdWidth = 200; 
        const tdHeight = 100;
        topDownCanvas.width = tdWidth;
        topDownCanvas.height = tdHeight;
        const imgData = tdCtx.createImageData(tdWidth, tdHeight);
        let waveTime = 0;

        function renderTopDownWaves() {
            const shape = shapeSelect.value;
            const lam = parseFloat(sliders.lam.value);
            const N = shape === 'circ' ? 1 : parseInt(sliders.N.value);
            const d = parseFloat(sliders.d.value);
            const rgb = waveToRGB(lam);

            const k = (2 * Math.PI) / (lam / 25); 
            const omega = 0.4; 
            
            let slitXs = [];
            const slitSpacing = d * 15; 
            const startX = (tdWidth / 2) - ((N - 1) * slitSpacing) / 2;
            for(let i=0; i<N; i++) slitXs.push(startX + i * slitSpacing);

            let dataIndex = 0;
            for (let y = 0; y < tdHeight; y++) {
                const py = tdHeight - y; 
                const fade = Math.max(0, 1 - (py / tdHeight)); 

                for (let x = 0; x < tdWidth; x++) {
                    let amp = 0;
                    for(let i=0; i<N; i++) {
                        const dx = x - slitXs[i];
                        const distance = Math.sqrt(dx*dx + py*py);
                        amp += Math.cos(k * distance - waveTime * omega);
                    }
                    amp = amp / N; 
                    const intensityVal = ((amp + 1) / 2) * fade; 
                    
                    imgData.data[dataIndex++] = rgb[0] * intensityVal; 
                    imgData.data[dataIndex++] = rgb[1] * intensityVal; 
                    imgData.data[dataIndex++] = rgb[2] * intensityVal; 
                    imgData.data[dataIndex++] = 255;                   
                }
            }
            tdCtx.putImageData(imgData, 0, 0);
            waveTime += 1;
            requestAnimationFrame(renderTopDownWaves); 
        }

        function updateAll() {
            Object.keys(sliders).forEach(key => {
                if(document.getElementById('val_' + key)) {
                    document.getElementById('val_' + key).innerText = parseFloat(sliders[key].value).toFixed(key === 'lam' || key === 'N' ? 0 : 2);
                }
            });
            const data = computePhysics();
            renderPattern(data.intensity);
            renderChart(data);
        }

        Object.values(sliders).forEach(slider => slider.addEventListener('input', updateAll));
        shapeSelect.addEventListener('change', toggleUI);

        window.addEventListener('resize', () => renderPattern(computePhysics().intensity));
        updateAll();
        renderTopDownWaves(); 
    </script>
</body>
</html>
